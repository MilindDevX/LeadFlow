version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: leadflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: leadflow
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - leadflow-network

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadflow-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/leadflow
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
    ports:
      - '3001:5000'
    depends_on:
      - mongo
    networks:
      - leadflow-network

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadflow-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - leadflow-network

# ── Volumes & Networks ────────────────────────────────────────────────────────
volumes:
  mongo_data:

networks:
  leadflow-network:
    driver: bridge
